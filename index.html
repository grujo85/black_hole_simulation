<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Gargantua Simulation - Black Hole 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; }
        #ui { 
            position: absolute; bottom: 20px; left: 20px; 
            color: rgba(255,255,255,0.8); pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; color: #ffaa00; }
        p { margin: 5px 0 0; font-size: 0.8rem; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>GARGANTUA SIM v2.5</h1>
        <p>• Gravitational Lensing Enabled</p>
        <p>• Relativistic Jets Active</p>
        <p>• Miš: Rotacija | Skrol: Zoom</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. SCENA I RENDERER
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(50, 20, 70);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 2. POZADINA (Zvezde)
        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 20000; i++) {
                vertices.push((Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000, (Math.random() - 0.5) * 3000);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            return new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xffffff, size: 1.0, transparent: true, opacity: 0.8 }));
        }
        scene.add(createStars());

        // 3. HORIZONT DOGAĐAJA (Singularitet)
        const hole = new THREE.Mesh(
            new THREE.SphereGeometry(12, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        scene.add(hole);

        // 4. GRAVITACIONO SOČIVO (Einsteinov Prsten)
        // Ovaj prsten simulira savijanje svetlosti oko crne rupe
        const ringGeo = new THREE.TorusGeometry(12.8, 0.15, 16, 100);
        const ringMat = new THREE.MeshBasicMaterial({ 
            color: 0xffaa00, 
            transparent: true, 
            opacity: 0.4,
            blending: THREE.AdditiveBlending 
        });
        const lensingRing = new THREE.Mesh(ringGeo, ringMat);
        scene.add(lensingRing);

        // 5. AKRECIONI DISK (Sistem čestica)
        const particleCount = 60000;
        const positions = [];
        const colors = [];
        const colorInside = new THREE.Color("#ffaa00"); // Užarena narandžasta
        const colorOutside = new THREE.Color("#330800"); // Tamna crvena/braon

        for (let i = 0; i < particleCount; i++) {
            const r = 16 + Math.random() * 45;
            const angle = Math.random() * Math.PI * 2;
            const x = r * Math.cos(angle);
            const z = r * Math.sin(angle);
            const y = (Math.random() - 0.5) * (1.8 * Math.pow(r/60.0, 2.0)); 

            positions.push(x, y, z);

            const mixedColor = colorInside.clone().lerp(colorOutside, (r - 16) / 45);
            colors.push(mixedColor.r, mixedColor.g, mixedColor.b);
        }

        const diskGeo = new THREE.BufferGeometry();
        diskGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        diskGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        const diskMat = new THREE.PointsMaterial({
            size: 0.12,
            vertexColors: true,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const disk = new THREE.Points(diskGeo, diskMat);
        scene.add(disk);

        // 6. RELATIVISTIČKI MLAZOVI (Jets)
        function createJet(isTop) {
            const jetGeo = new THREE.CylinderGeometry(0.5, 12, 300, 32, 1, true);
            const jetMat = new THREE.MeshBasicMaterial({
                color: 0x4488ff,
                transparent: true,
                opacity: 0.05,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const jet = new THREE.Mesh(jetGeo, jetMat);
            jet.position.y = isTop ? 160 : -160;
            if (!isTop) jet.rotation.x = Math.PI;
            return jet;
        }
        scene.add(createJet(true));
        scene.add(createJet(false));

        // 7. ANIMACIONA PETLJA
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            
            // Rotacija diska
            disk.rotation.y += 0.0012;
            
            // Lensing Ring uvek prati kameru (simulacija optičkog fenomena)
            lensingRing.lookAt(camera.position);
            
            // Pulsiranje prstena (nestabilnost svetlosti na ivici)
            lensingRing.scale.setScalar(1 + Math.sin(time * 2.0) * 0.015);
            lensingRing.material.opacity = 0.35 + Math.sin(time * 5.0) * 0.05;

            controls.update();
            renderer.render(scene, camera);
        }

        // HANDLER ZA PROZOR
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
